model: qwen3.5:9b
default_delay_seconds: 2
max_retries: 3
warmup_llm: true

watch_folder: ~/Nextcloud/Notes

rate_limit:
  delay_per_domain: 2
  delay_global: 1

content:
  min_length: 100
  max_length: 8000

http:
  retry_429_count: 3
  retry_429_backoff_seconds: 1.0

llm:
  timeout_seconds: 120
  max_parallel_jobs: 1
  temperature_attempts:
    - 0.05
    - 0.25
    - 0.50

folders:
  articles: articles
  processed: processed
  originals: originals
  errors: errors
  other: Other

logging:
  level: INFO
  folder: ~/.logseq-processor/logs
  retention_days: 7
  console: true
  queue_heartbeat_seconds: 10

# ================================
# GitHub Actions Integration Notes
# ================================
# When using GitHub Actions:
#
# 1. URLs are submitted via the "Process Articles" workflow
# 2. Queue files are created in queue/ folder with metadata
# 3. Local worker runs: uv run logseq-processor --worker ingest
#    to pull from queue and extract content
# 4. Local worker runs: uv run logseq-processor --worker llm
#    to process extracted content with LLM
# 5. Results are committed back and synced to GitHub
#
# See docs/GITHUB_ACTIONS.md for full setup instructions
