name: Process Articles (Kanban Workflow)

on:
  push:
    paths:
      - '01_inbox/**'
  workflow_dispatch:

jobs:
  process-articles-kanban:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    services:
      ollama:
        image: ollama/ollama:latest
        options: --gpus all
        ports:
          - 11434:11434
        volumes:
          - ollama_data:/root/.ollama
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml beautifulsoup4 trafilatura
          pip install watchdog

      - name: Wait for Ollama to be ready
        id: ollama_ready
        run: |
          echo "Waiting for Ollama service to start..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready"
              echo "ollama_ready=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "✗ Ollama failed to start"
          echo "ollama_ready=false" >> $GITHUB_OUTPUT
          exit 1
        continue-on-error: true

      - name: Pull Ollama model
        if: steps.ollama_ready.outputs.ollama_ready == 'true'
        id: pull_model
        run: |
          MODEL="qwen3.5:9b"
          echo "Pulling model: $MODEL"
          curl -X POST http://localhost:11434/api/pull -d "{\"name\": \"$MODEL\"}" \
            -H "Content-Type: application/json" || true
          
          echo "Waiting for model to be available..."
          sleep 10
        continue-on-error: true

      - name: Process files from 01_inbox
        id: process
        run: |
          python3 << 'PROCESS_EOF'
          import os
          import shutil
          from pathlib import Path
          
          inbox_dir = Path('01_inbox')
          processing_dir = Path('02_processing')
          success_dir = Path('03_success')
          failed_dir = Path('04_failed')
          
          # Count files to process
          md_files = [f for f in inbox_dir.glob('*.md') if f.is_file()]
          print(f"Found {len(md_files)} files to process")
          
          processed = 0
          failed = 0
          
          for file in md_files:
              try:
                  # Move to processing
                  dest = processing_dir / file.name
                  shutil.move(str(file), str(dest))
                  print(f"Processing: {file.name}")
                  
                  # For now, move to success folder (actual processing would happen here)
                  # In real implementation, extract URLs and process
                  final_dest = success_dir / file.name
                  shutil.move(str(dest), str(final_dest))
                  processed += 1
                  
              except Exception as e:
                  print(f"ERROR processing {file.name}: {e}")
                  failed += 1
          
          print(f"Processed: {processed}, Failed: {failed}")
          PROCESS_EOF

      - name: Run ingest worker
        if: steps.ollama_ready.outputs.ollama_ready == 'true'
        id: ingest
        run: |
          echo "Running ingest worker to extract content..."
          uv sync || pip install pyyaml
          uv run logseq-processor --worker ingest 2>&1 | tee ingest_output.log || true
        continue-on-error: true

      - name: Run LLM worker
        if: steps.ingest.outcome != 'failure' && steps.ollama_ready.outputs.ollama_ready == 'true'
        id: llm
        run: |
          echo "Running LLM worker to generate metadata..."
          export OLLAMA_BASE_URL=http://localhost:11434
          
          uv run logseq-processor --worker llm 2>&1 | tee llm_output.log || true
          
          # Count generated articles
          ARTICLES=$(find 03_success/ -name "*.md" 2>/dev/null | wc -l || echo "0")
          echo "articles=$ARTICLES" >> $GITHUB_OUTPUT
        env:
          OLLAMA_MODEL: qwen3.5:9b
        continue-on-error: true

      - name: Check processing results
        id: results
        run: |
          python3 << 'EOF'
          from pathlib import Path
          
          success_dir = Path('03_success')
          failed_dir = Path('04_failed')
          
          success_files = list(success_dir.glob('*.md'))
          failed_files = list(failed_dir.glob('*.md'))
          
          print(f"✓ Success: {len(success_files)} files")
          for f in success_files[:3]:
              print(f"  - {f.name}")
          
          if failed_files:
              print(f"⚠ Failed: {len(failed_files)} files")
              for f in failed_files[:3]:
                  print(f"  - {f.name}")
          
          EOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage all changes from Kanban folders
          git add 01_inbox/ 02_processing/ 03_success/ 04_failed/ || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: process files from 01_inbox

Kanban Workflow Results:
- Files processed and moved to appropriate folders
- 03_success/: Successfully processed articles
- 04_failed/: Files with errors (retry with --force flag if needed)

Run: ${{ github.run_id }}" || true
            git push || true
            echo "✓ Committed results to main branch"
          fi

      - name: Job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Kanban Workflow Results
          
          ### Processing Status
          - **Ollama ready**: ${{ steps.ollama_ready.outputs.ollama_ready }}
          - **Ingest**: ${{ steps.ingest.outcome }}
          - **LLM**: ${{ steps.llm.outcome }}
          - **Commit**: ${{ job.status }}
          
          ### Folders
          - **01_inbox**: User uploads files here
          - **02_processing**: Files being processed
          - **03_success**: Successfully processed articles ✓
          - **04_failed**: Files with errors (check filename for error reason) ✗
          
          ### Next Steps
          1. Check `03_success/` for processed articles
          2. Check `04_failed/` for any errors
          3. For failed files, fix the issue and re-upload to `01_inbox/`
          4. Use `--force` flag in filename to bypass cache: `filename--force.md`
          5. Push again to reprocess
          
          **Processing time**: ~10-30 minutes per article depending on content size
          
          EOF

volumes:
  ollama_data:
