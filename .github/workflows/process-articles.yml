name: Process Articles (End-to-End)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Comma-separated list of URLs to process'
        required: true
        type: string
      titles:
        description: 'Optional: comma-separated article titles (one per URL)'
        required: false
        type: string
      tags:
        description: 'Optional: comma-separated tags (applies to all URLs)'
        required: false
        type: string
      force:
        description: 'Force reprocessing even if already processed'
        required: false
        type: boolean
      check_reachable:
        description: 'Validate URL reachability with HTTP HEAD check'
        required: false
        type: boolean
        default: true
      ollama_model:
        description: 'Ollama model to use (default: qwen3.5:9b)'
        required: false
        type: string
        default: 'qwen3.5:9b'

jobs:
  process-articles-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    services:
      ollama:
        image: ollama/ollama:latest
        options: --gpus all
        ports:
          - 11434:11434
        volumes:
          - ollama_data:/root/.ollama
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Wait for Ollama to be ready
        id: ollama_ready
        run: |
          echo "Waiting for Ollama service to start..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✓ Ollama is ready"
              echo "ollama_ready=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "✗ Ollama failed to start"
          echo "ollama_ready=false" >> $GITHUB_OUTPUT
          exit 1
        continue-on-error: true

      - name: Pull Ollama model
        if: steps.ollama_ready.outputs.ollama_ready == 'true'
        id: pull_model
        run: |
          MODEL="${{ github.event.inputs.ollama_model }}"
          echo "Pulling model: $MODEL"
          curl -X POST http://localhost:11434/api/pull -d "{\"name\": \"$MODEL\"}" \
            -H "Content-Type: application/json" || true
          
          echo "Waiting for model to be available..."
          sleep 10
        continue-on-error: true

      - name: Validate and queue URLs
        id: queue
        run: |
          cd scripts
          
          # Build script arguments
          SCRIPT_ARGS="${{ github.event.inputs.urls }}"
          
          if [ -n "${{ github.event.inputs.titles }}" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --titles=${{ github.event.inputs.titles }}"
          fi
          
          if [ -n "${{ github.event.inputs.tags }}" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --tags=${{ github.event.inputs.tags }}"
          fi
          
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --force"
          fi
          
          if [ "${{ github.event.inputs.check_reachable }}" = "true" ]; then
            SCRIPT_ARGS="$SCRIPT_ARGS --check-reachable"
          fi
          
          # Run queue script
          python3 queue_to_markdown.py "$SCRIPT_ARGS" > queue_output.txt 2>&1
          QUEUE_EXIT=$?
          
          cat queue_output.txt
          
          # Extract counts from output
          QUEUED=$(grep "^Queued:" queue_output.txt | awk '{print $2}' | cut -d',' -f1 || echo "0")
          FAILED=$(grep "^Queued:" queue_output.txt | awk '{print $4}' || echo "0")
          
          echo "queued=$QUEUED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Run ingest worker
        if: steps.queue.outputs.queued > 0 && steps.ollama_ready.outputs.ollama_ready == 'true'
        id: ingest
        run: |
          echo "Running ingest worker to extract content from URLs..."
          uv sync
          uv run logseq-processor --worker ingest --debug 2>&1 | tee ingest_output.log || true
          
          # Count processed files
          PROCESSED=$(find queue/ -name "*.md" | wc -l || echo "0")
          echo "processed=$PROCESSED" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run LLM worker
        if: steps.ingest.outcome != 'failure' && steps.ollama_ready.outputs.ollama_ready == 'true'
        id: llm
        run: |
          echo "Running LLM worker to generate metadata..."
          export OLLAMA_BASE_URL=http://localhost:11434
          
          # Create temporary config with Ollama settings
          python3 << 'CONFIG_EOF'
          import yaml
          import os
          
          # Load existing config
          with open('config.yaml') as f:
              config = yaml.safe_load(f)
          
          # Update for GitHub Actions
          config['model'] = os.getenv('OLLAMA_MODEL', 'qwen3.5:9b')
          config['watch_folder'] = 'queue'
          config['llm']['timeout_seconds'] = 180
          config['llm']['max_parallel_jobs'] = 1
          
          # Write modified config
          with open('config.yaml', 'w') as f:
              yaml.dump(config, f)
          
          print("✓ Updated config for GitHub Actions LLM processing")
          
          CONFIG_EOF
          
          uv run logseq-processor --worker llm --debug 2>&1 | tee llm_output.log || true
          
          # Count generated articles
          ARTICLES=$(find articles/ -name "*.md" 2>/dev/null | wc -l || echo "0")
          echo "articles=$ARTICLES" >> $GITHUB_OUTPUT
        env:
          OLLAMA_MODEL: ${{ github.event.inputs.ollama_model }}
        continue-on-error: true

      - name: Check processing results
        id: results
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          
          articles_dir = Path('articles')
          articles = list(articles_dir.glob('*.md')) if articles_dir.exists() else []
          
          print(f"✓ Generated {len(articles)} articles")
          for article in articles[:5]:
              print(f"  - {article.name}")
          if len(articles) > 5:
              print(f"  ... and {len(articles) - 5} more")
          
          # Count queue items
          queue_items = list(Path('queue').glob('pending_*.md'))
          if queue_items:
              print(f"\n⚠ {len(queue_items)} queue items remaining")
          
          EOF

      - name: Commit processed articles
        if: steps.llm.outputs.articles > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are new articles to commit
          git add articles/ queue/status.json || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[GitHub Actions] Processed articles (end-to-end)

Workflow: Process Articles (End-to-End)
Model: ${{ github.event.inputs.ollama_model }}
URLs: ${{ github.event.inputs.urls }}
Run: ${{ github.run_id }}"
            git push
            echo "✓ Committed results to main branch"
          fi

      - name: Job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Processing Results
          
          ### Input
          - **URLs submitted**: ${{ steps.queue.outputs.queued }}
          - **Validation failed**: ${{ steps.queue.outputs.failed }}
          
          ### Processing
          - **Ollama ready**: ${{ steps.ollama_ready.outputs.ollama_ready }}
          - **Model used**: ${{ github.event.inputs.ollama_model }}
          - **Articles generated**: ${{ steps.llm.outputs.articles }}
          
          ### Status
          - **Queued**: ${{ steps.queue.outcome }}
          - **Ingest**: ${{ steps.ingest.outcome }}
          - **LLM**: ${{ steps.llm.outcome }}
          - **Committed**: ${{ job.status }}
          
          ### Next Steps
          
          1. Pull latest articles: `git pull`
          2. Review generated articles in `articles/` folder
          3. Check `queue/status.json` for processing state
          4. Submit more URLs with this workflow
          
          **Note**: Processing time depends on:
          - Number of URLs (1-5: 2-5 min, 5-10: 10-20 min)
          - Content size and complexity
          - Ollama model size and performance
          
          EOF

volumes:
  ollama_data:
