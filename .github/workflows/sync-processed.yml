name: Sync Processed Files

on:
  workflow_dispatch:
    inputs:
      update_status:
        description: 'Update queue status after sync'
        required: false
        type: boolean
        default: true

jobs:
  sync-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Fetch latest changes
        run: |
          git fetch origin main
          git merge origin/main --no-edit || true

      - name: Check for processed articles
        id: check
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          from datetime import datetime
          
          # Count articles
          articles_dir = Path('articles')
          article_count = 0
          if articles_dir.exists():
              article_count = len(list(articles_dir.glob('*.md')))
          
          print(f"Found {article_count} articles in articles/ directory")
          
          # Check queue status
          status_file = Path('queue/status.json')
          if status_file.exists():
              status = json.loads(status_file.read_text())
              print(f"\nQueue Status:")
              print(f"  Pending: {len(status.get('queued', []))}")
              print(f"  Processing: {len(status.get('processing', []))}")
              print(f"  Done: {len(status.get('done', []))}")
              print(f"  Errors: {len(status.get('error', []))}")
          
          EOF

      - name: Sync processed articles
        id: sync
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          from datetime import datetime, timezone
          from collections import defaultdict
          
          # Load status
          status_file = Path('queue/status.json')
          status = json.loads(status_file.read_text()) if status_file.exists() else {}
          
          # Get git log to find newly added articles since last sync
          import subprocess
          
          try:
              # Get list of newly added markdown files in articles/
              result = subprocess.run(
                  ['git', 'log', '--name-only', '--pretty=format:', '--diff-filter=A', '-5', '--', 'articles/*.md'],
                  capture_output=True,
                  text=True
              )
              
              new_files = [f.strip() for f in result.stdout.split('\n') if f.strip()]
              print(f"Found {len(new_files)} newly processed articles")
              
              for file in new_files[:10]:  # Show first 10
                  print(f"  ✓ {file}")
              
          except Exception as e:
              print(f"Could not get git diff: {e}")
          
          EOF

      - name: Update queue status
        if: github.event.inputs.update_status == 'true'
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          from datetime import datetime, timezone
          
          # This would normally be updated by the local worker
          # For now, just update the last_sync timestamp
          status_file = Path('queue/status.json')
          
          if status_file.exists():
              status = json.loads(status_file.read_text())
              status['last_sync'] = datetime.now(timezone.utc).isoformat()
              status_file.write_text(json.dumps(status, indent=2))
              print("✓ Updated queue/status.json with last_sync timestamp")
          
          EOF

      - name: Commit sync results
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if [ -z "$(git status --porcelain)" ]; then
              echo "No changes to commit"
              echo "commit_made=false" >> $GITHUB_OUTPUT
          else
              git add -A
              git commit -m "[GitHub Actions] Sync: processed articles updated" \
                -m "Workflow run: ${{ github.run_id }}" \
                -m "User: ${{ github.actor }}"
              git push
              echo "commit_made=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean queue
        if: steps.commit.outputs.commit_made == 'true'
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          
          # Archive old pending files (optional)
          queue_dir = Path('queue')
          pending_files = list(queue_dir.glob('pending_*.md'))
          
          if pending_files:
              print(f"Found {len(pending_files)} pending files")
              print("Note: Local worker should have moved these to processed/ on successful completion")
          
          EOF

      - name: Job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Sync Results
          
          ### Status
          - **Synced**: Processed articles from local worker
          - **Articles**: Check `articles/` folder for results
          - **Queue**: Check `queue/status.json` for processing status
          
          ### Next Steps
          
          1. Review newly processed articles in the `articles/` folder
          2. Check `queue/status.json` for completion status
          3. Run `python scripts/check_queue.py` to see full queue status
          4. Submit more URLs with the "Process Articles" workflow
          
          EOF
