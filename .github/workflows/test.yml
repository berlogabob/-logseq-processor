name: Tests and Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        if: hashFiles('tests/') != ''
        run: uv run pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Validate project structure
        run: |
          python3 << 'EOF'
          import sys
          from pathlib import Path
          
          errors = []
          
          # Check required files
          required_files = [
              'src/main.py',
              'config.yaml',
              'pyproject.toml',
              'queue/status.json',
              'scripts/validate_urls.py',
              'scripts/queue_to_markdown.py',
              'scripts/check_queue.py'
          ]
          
          for file in required_files:
              path = Path(file)
              if not path.exists():
                  errors.append(f"❌ Missing: {file}")
              else:
                  print(f"✓ Found: {file}")
          
          # Check required folders
          required_dirs = ['src', 'queue', 'scripts', '.github/workflows']
          for dir_name in required_dirs:
              path = Path(dir_name)
              if not path.is_dir():
                  errors.append(f"❌ Missing directory: {dir_name}")
              else:
                  print(f"✓ Directory: {dir_name}")
          
          if errors:
              print("\n⚠️ Validation errors:")
              for error in errors:
                  print(f"  {error}")
              sys.exit(1)
          else:
              print("\n✓ All required files and directories present")
          
          EOF

      - name: Validate dependencies
        run: |
          uv run python << 'EOF'
          import sys
          
          required_packages = [
              'trafilatura',
              'beautifulsoup4',
              'ollama',
              'watchdog',
              'pydantic',
              'requests',
              'youtube_transcript_api',
              'yaml'
          ]
          
          missing = []
          for package in required_packages:
              try:
                  __import__(package)
                  print(f"✓ {package}")
              except ImportError:
                  missing.append(package)
                  print(f"❌ {package}")
          
          if missing:
              print(f"\n⚠️ Missing dependencies: {', '.join(missing)}")
              sys.exit(1)
          else:
              print("\n✓ All dependencies available")
          
          EOF

      - name: Test queue scripts
        run: |
          cd scripts
          
          # Test validate_urls
          echo "Testing validate_urls.py..."
          uv run python validate_urls.py "https://example.com" "invalid url" 2>&1 | grep -q "Valid: 1" && echo "✓ validate_urls works" || exit 1
          
          # Test queue_to_markdown
          echo "Testing queue_to_markdown.py..."
          uv run python queue_to_markdown.py "https://example.com" --tags="test" 2>&1 | grep -q "Queued: 1" && echo "✓ queue_to_markdown works" || exit 1
          
          # Clean up test queue
          cd ..
          rm -f queue/pending_*.md
          cat > queue/status.json << 'STATUSEOF'
          {
            "queued": [],
            "processing": [],
            "done": [],
            "error": [],
            "last_update": null,
            "stats": {
              "total_queued": 0,
              "total_processed": 0,
              "total_errors": 0
            }
          }
          STATUSEOF

      - name: Lint check (optional)
        run: |
          uv run python -m py_compile src/*.py scripts/*.py 2>&1 | grep -q "error" && exit 1 || exit 0
        continue-on-error: true

      - name: Job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Test Results
          
          - **Python Version**: ${{ matrix.python-version }}
          - **OS**: Ubuntu Latest
          - **Status**: ✓ Validation passed
          
          ### Checks Performed
          - ✓ Project structure validation
          - ✓ Required files and directories
          - ✓ Dependency availability
          - ✓ Queue scripts functionality
          - ✓ Python compilation
          
          EOF
